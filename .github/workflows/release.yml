name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-15
            target: aarch64-apple-darwin
            platform: macos
            arch: arm64
            binary: bricklogo
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            platform: linux
            arch: arm64
            binary: bricklogo
          - os: windows-2025
            target: x86_64-pc-windows-msvc
            platform: windows
            arch: x64
            binary: bricklogo.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev libudev-dev pkg-config zip

      - name: Build
        run: cargo build --release --bin bricklogo --target ${{ matrix.target }}

      - name: Sign and notarize (macOS)
        if: matrix.platform == 'macos'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
        run: |
          # Import certificate into temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          KEYCHAIN_PASSWORD=$(uuidgen)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          CERT_PATH=$RUNNER_TEMP/certificate.p12
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERT_PATH"
          security import "$CERT_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain

          # Sign the binary
          BINARY_PATH="target/${{ matrix.target }}/release/${{ matrix.binary }}"
          codesign --force --options runtime --sign "Developer ID Application: $(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep "Developer ID Application" | head -1 | sed 's/.*"\(.*\)"/\1/')" "$BINARY_PATH"

          # Notarize: zip the binary, submit, wait, staple
          NOTARIZE_ZIP=$RUNNER_TEMP/notarize.zip
          ditto -c -k --keepParent "$BINARY_PATH" "$NOTARIZE_ZIP"
          xcrun notarytool submit "$NOTARIZE_ZIP" --apple-id "$APPLE_ID" --password "$APPLE_ID_PASSWORD" --team-id "$APPLE_TEAM_ID" --wait

          # Clean up keychain
          security delete-keychain "$KEYCHAIN_PATH"

      - name: Package (Unix)
        if: matrix.platform != 'windows'
        run: |
          STAGING=$(mktemp -d)
          mkdir -p "$STAGING/bricklogo"
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "$STAGING/bricklogo/"
          cp bricklogo.config.json.example "$STAGING/bricklogo/"
          cp -r examples "$STAGING/bricklogo/"
          cp -r firmware "$STAGING/bricklogo/"
          cp -r docs "$STAGING/bricklogo/"
          cd "$STAGING"
          zip -r "bricklogo-${{ github.event.release.tag_name }}-${{ matrix.platform }}-${{ matrix.arch }}.zip" bricklogo/
          mv *.zip "$GITHUB_WORKSPACE/"

      - name: Package (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $staging = Join-Path $env:TEMP "bricklogo-release"
          if (Test-Path $staging) { Remove-Item $staging -Recurse -Force }
          New-Item -ItemType Directory -Path "$staging\bricklogo" | Out-Null
          Copy-Item "target\${{ matrix.target }}\release\${{ matrix.binary }}" "$staging\bricklogo\"
          Copy-Item "bricklogo.config.json.example" "$staging\bricklogo\"
          Copy-Item -Recurse "examples" "$staging\bricklogo\examples"
          Copy-Item -Recurse "firmware" "$staging\bricklogo\firmware"
          Copy-Item -Recurse "docs" "$staging\bricklogo\docs"
          Compress-Archive -Path "$staging\bricklogo" -DestinationPath "bricklogo-${{ github.event.release.tag_name }}-${{ matrix.platform }}-${{ matrix.arch }}.zip"
          Remove-Item $staging -Recurse -Force

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: bricklogo-*.zip
